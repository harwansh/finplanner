version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm --version
            - npm ci
            - |
              echo "VITE_CHAT_API_URL=$VITE_CHAT_API_URL" > .env.production
              echo "VITE_API_URL=$VITE_API_URL" >> .env.production
              echo "Configured chatbot API env"
        build:
          commands:
            - npm run build
            - test -f dist/index.html
            - test -f dist/sitemap.xml
            - test -f dist/robots.txt
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
