version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            - |
              echo "VITE_AWS_REGION=$VITE_AWS_REGION" >> .env.production
              echo "VITE_USER_POOL_ID=$VITE_USER_POOL_ID" >> .env.production
              echo "VITE_USER_POOL_CLIENT_ID=$VITE_USER_POOL_CLIENT_ID" >> .env.production
              echo "VITE_API_URL=$VITE_API_URL" >> .env.production
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
