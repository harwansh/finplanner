AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FinPlanner - Open API + Bedrock (no auth, no storage)

Parameters:
  AppName:
    Type: String
    Default: finplanner
  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-5-20250929-v1:0
  BedrockRegion:
    Type: String
    Default: us-east-1

Globals:
  Function:
    Runtime: python3.12
    Timeout: 120
    MemorySize: 1024
    Architectures: [arm64]
    Environment:
      Variables:
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        BEDROCK_REGION: !Ref BedrockRegion

Resources:
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 5
          ThrottlingBurstLimit: 10

  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/src/analyze/
      Handler: app.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
      Events:
        Analyze:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /analyze
            Method: post

Outputs:
  ApiUrl:
    Description: REST API endpoint
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod
