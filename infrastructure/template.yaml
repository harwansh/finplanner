AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FinPlanner - Lambda Function URL + Bedrock

Parameters:
  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-5-20250929-v1:0
  BedrockRegion:
    Type: String
    Default: us-east-1

Resources:
  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/src/analyze/
      Handler: app.handler
      Runtime: python3.12
      Architectures: [arm64]
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_REGION: !Ref BedrockRegion
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: ["*"]
          AllowMethods: ["POST"]
          AllowHeaders: ["Content-Type"]

Outputs:
  ApiUrl:
    Description: Lambda Function URL
    Value: !GetAtt AnalyzeFunctionUrl.FunctionUrl
