AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Personal Financial Planner - Cognito + DynamoDB + Lambda + Bedrock

Parameters:
  AppName:
    Type: String
    Default: finplanner
  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-5-20250929-v1:0
    Description: Bedrock model. Update to latest available in your region.
  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: Region where Bedrock model is available.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 512
    Architectures: [arm64]
    Environment:
      Variables:
        TABLE_NAME: !Ref ProfileTable
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        BEDROCK_REGION: !Ref BedrockRegion

Resources:

  # ---------- Cognito (auth) ----------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AppName}-users
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub ${AppName}-web
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ---------- DynamoDB (storage) ----------
  ProfileTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AppName}-profiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # ---------- API Gateway ----------
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuth
        Authorizers:
          CognitoAuth:
            UserPoolArn: !GetAtt UserPool.Arn

  # ---------- Lambdas ----------
  ProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/src/profile/
      Handler: app.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProfileTable
      Events:
        GetProfile:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /profile
            Method: get
        PutProfile:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /profile
            Method: put

  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/src/analyze/
      Handler: app.handler
      Timeout: 120
      MemorySize: 1024
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProfileTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        Analyze:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /analyze
            Method: post

Outputs:
  ApiUrl:
    Description: REST API endpoint
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  Region:
    Value: !Ref AWS::Region
