name: Deploy SmartFinly Frontend

on:
  workflow_dispatch:
    inputs:
      build_only:
        description: 'Build only without deploying to S3/CloudFront'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AWS_REGION: ${{ secrets.VITE_AWS_REGION }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}

      - name: Stop after build-only run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_only == 'true' }}
        run: |
          echo "Build-only run completed. Skipping deploy."

      - name: Validate deploy secrets
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.build_only == 'true') }}
        run: |
          missing=0
          for name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_REGION SMARTFINLY_S3_BUCKET; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add the missing GitHub Actions secrets or rerun with build_only=true."
            exit 1
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SMARTFINLY_S3_BUCKET: ${{ secrets.SMARTFINLY_S3_BUCKET }}

      - name: Configure AWS credentials
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.build_only == 'true') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload assets with long cache
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.build_only == 'true') }}
        run: |
          aws s3 sync dist s3://${{ secrets.SMARTFINLY_S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index without long cache
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.build_only == 'true') }}
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.SMARTFINLY_S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.build_only == 'true') && secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
